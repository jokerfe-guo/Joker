name = "joker-blog"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ── Pages configuration ─────────────────────────────────────────────────
pages_build_output_dir = ".next"

# ── D1 database binding ─────────────────────────────────────────────────
# 1. Create:  wrangler d1 create joker-blog
# 2. Copy the returned database_id here
[[d1_databases]]
binding      = "DB"
database_name = "joker-blog"
database_id  = "5710b15b-d6fd-4d6f-ab3e-2535731b4fd2"

# ── Environment variables (non-secret) ─────────────────────────────────
[vars]
NEXT_PUBLIC_SITE_URL = "https://joker.ai"

# ── Preview environment ─────────────────────────────────────────────────
[env.preview]
[env.preview.vars]
NEXT_PUBLIC_SITE_URL = "https://preview.joker.dev"

# ── Production environment ──────────────────────────────────────────────
[env.production]
[env.production.vars]
NEXT_PUBLIC_SITE_URL = "https://joker.ai"

# ── Secrets (set via wrangler secret put, not in this file) ────────────
# wrangler secret put CLOUDFLARE_API_TOKEN
# wrangler secret put CF_TEAM_DOMAIN        (e.g. myteam.cloudflareaccess.com)
